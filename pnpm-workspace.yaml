overrides:
  "@ionic/core": npm:voyager-ionic-core@8.8.10
  yargs: 17.7.3-candidate.0

patchedDependencies:
  "@capacitor/haptics": patches/@capacitor__haptics.patch
  "@capacitor/keyboard": patches/@capacitor__keyboard.patch
  openapi-fetch: patches/openapi-fetch.patch

publicHoistPattern:
  - workbox-window

updateConfig:
  ignoreDependencies:
    - history
    - "@types/history"
    - react-router
    - react-router-dom
    - "@types/react-router"
    - "@types/react-router-dom"

minimumReleaseAge: 0

allowBuilds:
  core-js: true
  esbuild: true
