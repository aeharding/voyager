overrides:
  "@ionic/core": npm:voyager-ionic-core@8.8.2

patchedDependencies:
  "@capacitor/android": patches/@capacitor__android.patch
  "@capacitor/haptics": patches/@capacitor__haptics.patch
  "@capacitor/keyboard": patches/@capacitor__keyboard.patch
  openapi-fetch: patches/openapi-fetch.patch
  # Patch targets threadiverse@0.10.1. Exposes cross_posts from PieFed's
  # getPost and getPosts responses, which SafeClient's Zod validation strips.
  # Can be dropped once threadiverse models cross_posts in its shared types.
  threadiverse: patches/threadiverse.patch

publicHoistPattern:
  - workbox-window

updateConfig:
  ignoreDependencies:
    - history
    - "@types/history"
    - react-router
    - react-router-dom
    - "@types/react-router"
    - "@types/react-router-dom"
