name: e2e

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

# A newer run for the same ref supersedes an in-progress one.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Report every browser independently — don't cancel the others when one fails.
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
            artifact: chromium
          - project: firefox
            browser: firefox
            artifact: firefox
          - project: webkit
            browser: webkit
            artifact: webkit
          - project: Mobile Chrome
            browser: chromium
            artifact: mobile-chrome
          - project: Mobile Safari
            browser: webkit
            artifact: mobile-safari
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        # The specs are fully page.route-mocked (no real Lemmy server needed).
        run: pnpm exec playwright test --project="${{ matrix.project }}"

      - name: Upload report
        # On failure this includes traces/screenshots from test-results/
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.artifact }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
