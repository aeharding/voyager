name: ci

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Test project
        run: pnpm test

      - name: 📝 Lint
        run: pnpm lint

      - name: 📝 Prettier formatting
        run: pnpm lint:formatting

      - name: 📝 Generate CSS types
        run: pnpm test:generatecsstypes

      - name: 💪 Type check
        run: pnpm test:typecheck

      - name: 📦 Build
        run: pnpm build

  build_android:
    name: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build (Ionic)
        run: pnpm ionic cap sync
        env:
          BUILD_FOSS_ONLY: true
          CI_PLATFORM: android

      - name: Set up JDK
        uses: actions/setup-java@de5a937a1dc73fbc1a67d7d1aa4bebc1082f3190
        with:
          distribution: temurin
          java-version-file: .tool-versions
          cache: gradle

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - run: mv android/app/build/outputs/apk/debug/app-debug.apk Voyager-Android-${{ github.sha }}-unsigned.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-Android-${{ github.sha }}-unsigned
          path: Voyager-Android-${{ github.sha }}-unsigned.apk

  build_ios:
    name: ios
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build (Ionic)
        run: pnpm ionic cap sync
        env:
          CI_PLATFORM: ios

      - name: Verify native project is in sync with source
        run: |
          if ! git diff --exit-code -- android ios; then
            echo "::error::cap sync modified tracked files under android/ or ios/. Run 'pnpm ionic cap sync' locally and commit the changes."
            exit 1
          fi

      - name: Build iOS app (no signing)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app
        run: |
          cd build/Build/Products/Debug-iphoneos
          zip -r "$GITHUB_WORKSPACE/Voyager-iOS-${{ github.sha }}-unsigned.zip" App.app

      - name: Upload iOS app
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-iOS-${{ github.sha }}-unsigned
          path: Voyager-iOS-${{ github.sha }}-unsigned.zip
