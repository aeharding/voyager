name: flatpak

on:
  workflow_dispatch:
  pull_request:
    paths:
      - flatpak/**
      - .github/workflows/flatpak.yml
      # Offline sources are generated from lockfiles, so validate dep changes
      - pnpm-lock.yaml
      - src-tauri/Cargo.lock

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      # Generated fresh from the lockfiles every build so they can never
      # drift. (The flathub repo gets a committed copy at release time.)
      - name: Generate offline dependency sources
        run: |
          python3 -m pip install --quiet aiohttp tomlkit \
            "git+https://github.com/flatpak/flatpak-builder-tools.git@737c0085912f9f7dabf9341d4608e2a77a51a73a#subdirectory=node"
          curl -s https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/737c0085912f9f7dabf9341d4608e2a77a51a73a/cargo/flatpak-cargo-generator.py -o /tmp/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py src-tauri/Cargo.lock -o flatpak/cargo-sources.json
          flatpak-node-generator pnpm pnpm-lock.yaml --pnpm-store-version v11 -o flatpak/node-sources.json

      - name: Build flatpak from this commit
        run: |
          sed -i "s|commit: FLATPAK_GIT_COMMIT|commit: ${{ github.event.pull_request.head.sha || github.sha }}|" flatpak/app.vger.voyager.yml

      - uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: voyager.flatpak
          manifest-path: flatpak/app.vger.voyager.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: x86_64
