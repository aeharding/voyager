name: build_release

on:
  workflow_call: # for beta releases from main - release.yml / dispatch_beta_release
    inputs:
      is_main_build:
        type: boolean
        required: true
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

env:
  BUILD_LABEL: ${{ inputs.is_main_build && github.sha || github.ref_name }}

jobs:
  build_docker:
    uses: ./.github/workflows/docker.yml
    with:
      is_main_build: ${{ inputs.is_main_build || false }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  build_web:
    concurrency:
      group: web-release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # aws + attestation
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download bumped version artifacts
        if: inputs.is_main_build
        uses: actions/download-artifact@v8
        with:
          name: release-data

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build dist bundle
        run: pnpm build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Upload dist bundle to S3
        run: |
          aws s3 sync dist/ s3://${{ inputs.is_main_build && 'beta.vger.app' || 'vger.app'}}/ --delete

      - name: Compress artifacts
        run: |
          zip -r Voyager-Web-$BUILD_LABEL.zip dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: Voyager-Web-${{ env.BUILD_LABEL }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-Web-${{ env.BUILD_LABEL }}.zip
          path: Voyager-Web-${{ env.BUILD_LABEL }}.zip

  build_ios:
    concurrency:
      group: ios-release
    environment: deploy
    runs-on: macos-26
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download bumped version artifacts
        if: inputs.is_main_build
        uses: actions/download-artifact@v8
        with:
          name: release-data

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install

      - run: pnpm i --frozen-lockfile

      - name: Build (Ionic)
        run: pnpm ionic cap sync
        env:
          CI_PLATFORM: ios

      - name: Deploy to TestFlight
        run: |
          echo "$APP_STORE_CONNECT_KEY" > authkey.json
          bundle exec fastlane deploy
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          COMMIT_MSG: ${{ github.event.commits[0].message }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: Voyager-iOS-${{ env.BUILD_LABEL }}.ipa

      - name: Upload iOS IPA as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-iOS-${{ env.BUILD_LABEL }}.ipa
          path: Voyager-iOS-${{ env.BUILD_LABEL }}.ipa

  build_desktop:
    runs-on: ${{ matrix.runner }}
    # aarch64 is best-effort — don't block the release on it
    continue-on-error: ${{ matrix.arch == 'aarch64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download bumped version artifacts
        if: inputs.is_main_build
        uses: actions/download-artifact@v8
        with:
          name: release-data

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import GPG Key for Signing
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LINUX_GPG_PASSPHRASE }}

      - name: 📦 Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build (Tauri)
        run: pnpm tauri build
        env:
          SIGN: "1"

          TAURI_SIGNING_RPM_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          TAURI_SIGNING_RPM_KEY_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}

          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: "1"

      - name: Collect artifacts
        run: |
          mkdir out
          mv src-tauri/target/release/bundle/deb/*.deb out/Voyager-Linux-${{ matrix.arch }}-$BUILD_LABEL.deb
          mv src-tauri/target/release/bundle/rpm/*.rpm out/Voyager-Linux-${{ matrix.arch }}-$BUILD_LABEL.rpm
          mv src-tauri/target/release/bundle/appimage/*.AppImage out/Voyager-Linux-${{ matrix.arch }}-$BUILD_LABEL.AppImage

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: out/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-Desktop-${{ matrix.arch }}-${{ env.BUILD_LABEL }}
          path: out/*

  build_android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Download bumped version artifacts
        if: inputs.is_main_build
        uses: actions/download-artifact@v8
        with:
          name: release-data

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - run: pnpm i --frozen-lockfile

      - name: Build (Ionic)
        run: pnpm ionic cap sync
        env:
          BUILD_FOSS_ONLY: true
          CI_PLATFORM: android

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .tool-versions
          cache: gradle

      - name: Build (Android)
        run: |
          echo $ANDROID_KEYSTORE | base64 --decode > android/app/release-ci.keystore
          cd android
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - run: mv android/app/build/outputs/apk/release/app-release.apk Voyager-Android-${{ env.BUILD_LABEL }}.apk

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: Voyager-Android-${{ env.BUILD_LABEL }}.apk

      - name: Send to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Voyager-Android-${{ env.BUILD_LABEL }}.apk
          path: Voyager-Android-${{ env.BUILD_LABEL }}.apk

  build_android_play:
    concurrency:
      group: android-release
    environment: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download bumped version artifacts
        if: inputs.is_main_build
        uses: actions/download-artifact@v8
        with:
          name: release-data

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install

      - run: pnpm i --frozen-lockfile

      - name: Build (Ionic)
        run: pnpm ionic cap sync
        env:
          CI_PLATFORM: android

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .tool-versions
          cache: gradle

      - name: Build (Android)
        run: |
          echo $ANDROID_KEYSTORE | base64 --decode > android/app/release-ci.keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}

      - name: Setup service account
        run: echo $GOOGLE_SERVICE_ACCOUNT | base64 --decode > android/pc-api.json
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Run Fastlane
        run: bundle exec fastlane android deploy
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

  create_release:
    needs:
      - build_web
      - build_ios
      - build_android_play
      - build_android
      - build_desktop
      - build_docker
    if: inputs.is_main_build != true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: Voyager-Web-${{ env.BUILD_LABEL }}.zip
          path: artifacts/web

      - name: Download iOS Artifact
        uses: actions/download-artifact@v8
        with:
          name: Voyager-iOS-${{ env.BUILD_LABEL }}.ipa
          path: artifacts/ios

      - name: Download Android Artifact
        uses: actions/download-artifact@v8
        with:
          name: Voyager-Android-${{ env.BUILD_LABEL }}.apk
          path: artifacts/android

      - name: Download Desktop Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: Voyager-Desktop-*
          path: artifacts/desktop
          merge-multiple: true

        # https://github.com/softprops/action-gh-release/pull/372#issuecomment-1642643937
      - name: Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@348e88fab4c37338b1e803ceb2d4a7a5db6c0833 # v6.2.2
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feat"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix"]
                },
                {
                  "title": "## 📝 Other Changes",
                  "labels": ["build", "chore", "ci", "docs", "perf", "refactor", "revert", "style", "test"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(feat|fix|build|chore|ci|docs|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: |
            artifacts/ios/*
            artifacts/android/*
            artifacts/desktop/*
            artifacts/web/*
